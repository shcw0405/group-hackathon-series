name: Enrich Submission Data

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: submissions-data
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enrich submissions with GitHub API data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Auto-discover all edition submissions
          for FILE in data/editions/*/submissions.json; do
            if [ ! -f "$FILE" ]; then
              continue
            fi

            EDITION=$(echo "$FILE" | grep -oP 'editions/\K[^/]+')
            echo "=== Processing edition $EDITION ==="

            LENGTH=$(jq length "$FILE")
            if [ "$LENGTH" -eq 0 ]; then
              echo "No submissions, skipping"
              continue
            fi

            for i in $(seq 0 $((LENGTH - 1))); do
              GITHUB_URL=$(jq -r ".[$i].github_url" "$FILE")

              # Parse owner/repo from URL
              REPO_PATH=$(echo "$GITHUB_URL" | sed -E 's|https?://github\.com/||; s|\.git$||; s|/$||')

              # Validate format
              if ! echo "$REPO_PATH" | grep -qE '^[^/]+/[^/]+$'; then
                echo "::warning::Skipping invalid URL: $GITHUB_URL"
                continue
              fi

              echo "Fetching data for $REPO_PATH ..."

              RESPONSE=$(gh api "repos/$REPO_PATH" 2>/dev/null) || {
                echo "::warning::API call failed for $REPO_PATH"
                continue
              }

              AVATAR=$(echo "$RESPONSE" | jq -r '.owner.avatar_url')
              REPO_NAME=$(echo "$RESPONSE" | jq -r '.name')
              STARS=$(echo "$RESPONSE" | jq '.stargazers_count')
              FORKS=$(echo "$RESPONSE" | jq '.forks_count')

              jq --argjson idx "$i" \
                 --arg avatar "$AVATAR" \
                 --arg repo_name "$REPO_NAME" \
                 --argjson stars "$STARS" \
                 --argjson forks "$FORKS" \
                 '.[$idx].avatar_url = $avatar | .[$idx].repo_name = $repo_name | .[$idx].stars = $stars | .[$idx].forks = $forks' \
                 "$FILE" > tmp.json && mv tmp.json "$FILE"

              echo "  Updated: $REPO_NAME (★$STARS 🍴$FORKS)"
            done
          done

          echo "Enrichment complete"

      - name: Commit and push if changed
        run: |
          git diff --quiet data/ && echo "No changes to commit" && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "Enrich submission data with GitHub API metadata"
          git push
