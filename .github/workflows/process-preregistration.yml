name: Process Pre-registration

on:
  issues:
    types: [opened]

jobs:
  process-preregistration:
    if: startsWith(github.event.issue.title, '[Pre-registration]')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    env:
      HACKATHON_TZ: Asia/Shanghai
      PREREGISTRATION_CLOSES_AT: '2026-04-20 00:00:00'

    steps:
      - name: Validate pre-registration window
        id: validate-window
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          NOW=$(TZ="$HACKATHON_TZ" date +%s)
          CLOSES_AT=$(TZ="$HACKATHON_TZ" date -d "$PREREGISTRATION_CLOSES_AT" +%s)

          if [ "$NOW" -ge "$CLOSES_AT" ]; then
            gh issue comment "$ISSUE_NUMBER" --repo "${{ github.repository }}" --body "**Pre-registration is closed.** Hackathon #1 now runs April 20 - May 3, 2026 (Asia/Shanghai), so team formation closed when the event began."
            gh issue close "$ISSUE_NUMBER" --repo "${{ github.repository }}" --reason not_planned
            echo "window_open=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "window_open=true" >> "$GITHUB_OUTPUT"

      - name: Post to tracking issue and close
        if: steps.validate-window.outputs.window_open == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          TRACKING_ISSUE=3

          # Build comment with attribution
          COMMENT="$(cat <<EOF
          ${ISSUE_BODY}

          ---
          _Submitted by @${ISSUE_AUTHOR} via #${ISSUE_NUMBER}_
          EOF
          )"

          # Post as comment on the tracking issue
          gh issue comment "$TRACKING_ISSUE" --repo "${{ github.repository }}" --body "$COMMENT"

          # Label and close the individual issue
          gh label create "pre-registration" --repo "${{ github.repository }}" --description "Hackathon pre-registration" --color "1D76DB" 2>/dev/null || true
          gh issue edit "$ISSUE_NUMBER" --repo "${{ github.repository }}" --add-label "pre-registration"
          gh issue comment "$ISSUE_NUMBER" --repo "${{ github.repository }}" --body "✅ Your pre-registration has been posted to the [Team Formation & Ideas thread](https://github.com/${{ github.repository }}/issues/${TRACKING_ISSUE}). Head there to discuss and find teammates!"
          gh issue close "$ISSUE_NUMBER" --repo "${{ github.repository }}" --reason completed
