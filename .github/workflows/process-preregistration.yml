name: Process Pre-registration

on:
  issues:
    types: [opened]

jobs:
  process-preregistration:
    if: startsWith(github.event.issue.title, '[Pre-registration]')
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Label issue and post confirmation
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "pre-registration" --repo "${{ github.repository }}" --description "Hackathon pre-registration" --color "1D76DB" || true
          gh issue edit ${{ github.event.issue.number }} --repo "${{ github.repository }}" --add-label "pre-registration"
          gh issue comment ${{ github.event.issue.number }} --repo "${{ github.repository }}" --body "📋 **Pre-registration received!** Your idea has been posted. Other members can comment here to discuss or express interest in joining your team. Good luck!"
